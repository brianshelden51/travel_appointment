<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlightCal — Flight Email to .ics</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --border: #d2d2d7;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --danger: #ff3b30;
    --warn: #ff9500;
    --success: #34c759;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── API Key section ── */
  .apikey-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }

  .apikey-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
  }

  .apikey-toggle:hover { background: #f9f9fb; }

  .apikey-status {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--danger);
    flex-shrink: 0;
  }
  .apikey-status.set { background: var(--success); }

  .apikey-label {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
  }

  .apikey-chevron {
    font-size: 11px;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .apikey-chevron.open { transform: rotate(180deg); }

  .apikey-body {
    padding: 0 20px 16px;
    display: none;
  }
  .apikey-body.open { display: block; }

  .apikey-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .apikey-input {
    flex: 1;
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 13px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    background: var(--bg);
  }
  .apikey-input:focus { border-color: var(--accent); }

  .btn {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: #e8e8ed;
    color: var(--text);
  }
  .btn-secondary:hover { background: #dededf; }

  .btn-sm { padding: 6px 12px; font-size: 13px; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #e0352b; }

  .apikey-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── Settings ── */
  .settings-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  label { font-size: 14px; }

  select {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    background: var(--bg);
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--accent); }

  .reminder-note {
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Email input ── */
  textarea {
    width: 100%;
    min-height: 180px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    outline: none;
    background: var(--bg);
    line-height: 1.5;
    margin-bottom: 12px;
  }
  textarea:focus { border-color: var(--accent); }

  .parse-row { display: flex; gap: 8px; align-items: center; }

  .error-box, .warn-box {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: none;
  }
  .error-box { background: #fff2f2; border: 1px solid #ffc5c5; color: var(--danger); }
  .warn-box  { background: #fff8ec; border: 1px solid #ffd580; color: #7a5200; }
  .error-box.show, .warn-box.show { display: block; }

  /* ── Leg cards ── */
  .leg-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 12px;
  }

  .leg-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .leg-num {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .span2 { grid-column: span 2; }

  .field { display: flex; flex-direction: column; gap: 4px; }

  .field label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--muted);
  }

  .field input {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    background: var(--bg);
    outline: none;
    width: 100%;
  }
  .field input:focus { border-color: var(--accent); }

  .tz-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    min-height: 14px;
  }

  .section-sep {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }

  .add-leg-row {
    margin-top: 4px;
  }

  /* ── Preview / download ── */
  .preview-card {
    background: #f9f9fb;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    margin-bottom: 12px;
  }

  .preview-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .preview-time {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .preview-body {
    font-size: 13px;
    white-space: pre-wrap;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .preview-meta {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }

  .download-link {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 18px;
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius-sm);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
  }
  .download-link:hover { background: var(--accent-hover); }

  .empty-state {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 24px 0;
  }

  .preview-actions {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 12px;
  }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .btn-primary.loading .spinner { display: inline-block; }
  .btn-primary.loading .btn-label { display: none; }

  @media (max-width: 600px) {
    .grid2, .grid3 { grid-template-columns: 1fr; }
    .span2 { grid-column: span 1; }
  }
</style>
</head>

<h1>FlightCal</h1>
<p class="subtitle">Paste a flight confirmation email, get .ics files for Apple Calendar.</p>

<!-- ── Section 0: API Key ── -->
<div class="apikey-header">
  <div class="apikey-toggle" id="apikeyToggle" onclick="toggleApiKey()">
    <div class="apikey-status" id="apikeyStatus"></div>
    <span class="apikey-label" id="apikeyLabel">Anthropic API Key</span>
    <span class="apikey-chevron" id="apikeyChevron">▼</span>
  </div>
  <div class="apikey-body" id="apikeyBody">
    <div class="apikey-row">
      <input type="password" class="apikey-input" id="apikeyInput" placeholder="sk-ant-…" autocomplete="off">
      <button class="btn btn-primary btn-sm" onclick="saveApiKey()">Save</button>
      <button class="btn btn-secondary btn-sm" onclick="clearApiKey()">Clear</button>
    </div>
    <p class="apikey-hint">Stored in localStorage. Never sent anywhere except api.anthropic.com.</p>
  </div>
</div>

<!-- ── Section 1: Settings ── -->
<div class="card">
  <div class="card-title">Settings</div>
  <div class="settings-row">
    <label for="checkinSelect">Check-in window</label>
    <select id="checkinSelect" onchange="updateReminderNote()">
      <option value="24">24 hours (most US domestic)</option>
      <option value="30">30 hours (Southwest, some international)</option>
    </select>
    <span class="reminder-note" id="reminderNote"></span>
  </div>
</div>

<!-- ── Section 2: Email Input ── -->
<div class="card">
  <div class="card-title">Flight Confirmation Email</div>
  <textarea id="emailInput" placeholder="Paste your flight confirmation email here…"></textarea>
  <div class="parse-row">
    <button class="btn btn-primary" id="parseBtn" onclick="parseEmail()">
      <span class="btn-label">Parse Email</span>
      <span class="spinner"></span>
    </button>
    <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
  </div>
  <div class="error-box" id="errorBox"></div>
  <div class="warn-box" id="warnBox"></div>
</div>

<!-- ── Section 3: Leg Cards ── -->
<div id="legsSection" style="display:none">
  <div id="legCards"></div>
  <div class="add-leg-row">
    <button class="btn btn-secondary btn-sm" onclick="addLeg()">+ Add Leg</button>
  </div>
</div>

<!-- ── Section 4: Preview & Download ── -->
<div class="card" id="previewSection" style="display:none">
  <div class="card-title">Preview &amp; Download</div>
  <div class="preview-actions">
    <button class="btn btn-secondary btn-sm" onclick="refreshPreviews()">↻ Refresh</button>
  </div>
  <div id="previews"></div>
</div>

// ─────────────────────────────────────────────────────────────────────────────
// Parser system prompt (cached by Anthropic — stable content)
// ─────────────────────────────────────────────────────────────────────────────
const PARSER_SYSTEM_PROMPT = `You parse flight confirmation emails and return structured JSON only — no prose, no markdown.

Return a single JSON object with this exact shape:
{
  "checkin_hours": 24,
  "legs": [
    {
      "airline": "American Airlines",
      "flightnum": "AA 100",
      "op_airline": "",
      "op_flightnum": "",
      "op_pnr": "",
      "origin": "JFK",
      "dest": "LAX",
      "depdt": "2026-08-25 08:00",
      "arrdt": "2026-08-25 11:30",
      "terminal": "",
      "gate": "",
      "seats": "12A",
      "pnr": "ABC123",
      "class": "Main Cabin",
      "equipment": "Boeing 737"
    }
  ]
}

Rules:
- checkin_hours: 30 for Southwest or if email mentions "30-hour" check-in, else 24.
- flightnum: marketed flight number (e.g. "AA 100"). Include space between carrier and number.
- op_airline / op_flightnum: operating carrier name and flight number if codeshare differs from marketed; else empty string.
- op_pnr: operating carrier PNR/confirmation if different from main pnr; else empty string.
- depdt / arrdt: "YYYY-MM-DD HH:MM" in local airport time, 24h format.
- terminal: departure terminal letter/number only (e.g. "2", "B"); this is the terminal at the origin airport where the passenger departs — NOT the arrival terminal; empty if not stated for the departure airport.
- gate: gate identifier; empty if unknown.
- seats: seat number(s); empty if not assigned.
- pnr: main booking confirmation code.
- class: fare class label from the email (e.g. "Main Cabin", "Business", "Economy"); empty if not stated.
- equipment: aircraft type from email; empty if not stated.
- All string values: use empty string "" for unknown/not-applicable, never null.
- legs: ordered departure-time ascending.
- Output ONLY the JSON object. No explanation.`;

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let legs = [];

// ─────────────────────────────────────────────────────────────────────────────
// API key UI
// ─────────────────────────────────────────────────────────────────────────────
function getApiKey() { return localStorage.getItem('fc_apikey') || ''; }

function toggleApiKey() {
  const body = document.getElementById('apikeyBody');
  const chevron = document.getElementById('apikeyChevron');
  const open = body.classList.toggle('open');
  chevron.classList.toggle('open', open);
  if (open) document.getElementById('apikeyInput').focus();
}

function saveApiKey() {
  const val = document.getElementById('apikeyInput').value.trim();
  if (!val) return;
  localStorage.setItem('fc_apikey', val);
  syncApiKeyStatus();
  // Collapse after save
  document.getElementById('apikeyBody').classList.remove('open');
  document.getElementById('apikeyChevron').classList.remove('open');
}

function clearApiKey() {
  localStorage.removeItem('fc_apikey');
  document.getElementById('apikeyInput').value = '';
  syncApiKeyStatus();
}

function syncApiKeyStatus() {
  const key = getApiKey();
  const status = document.getElementById('apikeyStatus');
  const label  = document.getElementById('apikeyLabel');
  if (key) {
    status.className = 'apikey-status set';
    label.textContent = 'Anthropic API Key ✓';
  } else {
    status.className = 'apikey-status';
    label.textContent = 'Anthropic API Key — not set';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Settings
// ─────────────────────────────────────────────────────────────────────────────
function updateReminderNote() {
  const hours = parseInt(document.getElementById('checkinSelect').value, 10);
  const mins = hours * 60 + 30;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  const note = m === 0
    ? `Reminder fires ${h}h before departure`
    : `Reminder fires ${h}h ${m}m before departure`;
  document.getElementById('reminderNote').textContent = note;
}

// ─────────────────────────────────────────────────────────────────────────────
// Parse email
// ─────────────────────────────────────────────────────────────────────────────
async function parseEmail() {
  const apiKey = getApiKey();
  if (!apiKey) {
    showError('Please set your Anthropic API key first.');
    return;
  }
  const emailText = document.getElementById('emailInput').value.trim();
  if (!emailText) {
    showError('Please paste a flight confirmation email.');
    return;
  }

  setParseLoading(true);
  clearMessages();

  // Security note: This calls the Anthropic API directly from the browser,
  // which means the API key is visible in network requests. Acceptable for
  // personal use; for public-facing deployments, proxy through a backend.
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        system: [
          {
            type: 'text',
            text: PARSER_SYSTEM_PROMPT,
            cache_control: { type: 'ephemeral' },
          }
        ],
        messages: [{ role: 'user', content: emailText.slice(0, 6000) }],
      }),
    });

    if (!resp.ok) {
      const errBody = await resp.json().catch(() => ({}));
      if (resp.status === 401) {
        showError('Invalid API key. Please check your Anthropic API key and try again.');
        // Expand the key section to prompt correction
        document.getElementById('apikeyBody').classList.add('open');
        document.getElementById('apikeyChevron').classList.add('open');
      } else {
        showError(`API error ${resp.status}: ${errBody?.error?.message || resp.statusText}`);
      }
      return;
    }

    const data = await resp.json();
    const raw = data?.content?.[0]?.text || '';
    let parsed;
    try {
      // Strip markdown code fences if model wraps output anyway
      const cleaned = raw.replace(/^```[a-z]*\n?/i, '').replace(/\n?```$/i, '').trim();
      parsed = JSON.parse(cleaned);
    } catch {
      showError('Could not parse model response as JSON. Try again or edit the legs manually below.');
      console.error('Raw model output:', raw);
      return;
    }

    if (!parsed.legs || !Array.isArray(parsed.legs) || parsed.legs.length === 0) {
      showError('No flight legs found in the email. Please check the input or add legs manually.');
      return;
    }

    // Override checkin_hours from parsed if model detected 30h
    if (parsed.checkin_hours === 30) {
      document.getElementById('checkinSelect').value = '30';
      updateReminderNote();
    }

    legs = parsed.legs.map(normalizeLeg);
    renderLegCards();
    refreshPreviews();

    const unknownTZ = legs.filter(l => !AIRPORT_TZ[l.origin] || !AIRPORT_TZ[l.dest]);
    if (unknownTZ.length > 0) {
      const codes = [...new Set(unknownTZ.flatMap(l => [l.origin, l.dest].filter(c => !AIRPORT_TZ[c])))];
      showWarn(`Timezone unknown for: ${codes.join(', ')}. Calendar events will use floating time (no timezone). Verify the times are correct.`);
    }

  } catch (err) {
    showError(`Network error: ${err.message}`);
  } finally {
    setParseLoading(false);
  }
}

function normalizeLeg(l) {
  return {
    airline:      l.airline      || '',
    flightnum:    l.flightnum    || '',
    op_airline:   l.op_airline   || '',
    op_flightnum: l.op_flightnum || '',
    op_pnr:       l.op_pnr       || '',
    origin:       (l.origin || '').toUpperCase(),
    dest:         (l.dest   || '').toUpperCase(),
    depdt:        l.depdt        || '',
    arrdt:        l.arrdt        || '',
    terminal:     l.terminal     || '',
    gate:         l.gate         || '',
    seats:        l.seats        || '',
    pnr:          l.pnr          || '',
    class:        l.class        || '',
    equipment:    l.equipment    || '',
  };
}

function setParseLoading(on) {
  const btn = document.getElementById('parseBtn');
  btn.classList.toggle('loading', on);
  btn.disabled = on;
}

// ─────────────────────────────────────────────────────────────────────────────
// Leg card rendering
// ─────────────────────────────────────────────────────────────────────────────
function renderLegCards() {
  const container = document.getElementById('legCards');
  container.innerHTML = '';
  legs.forEach((leg, i) => container.appendChild(buildLegCard(leg, i)));
  document.getElementById('legsSection').style.display = legs.length ? 'block' : 'none';
  document.getElementById('previewSection').style.display = legs.length ? 'block' : 'none';
}

function buildLegCard(leg, i) {
  const div = document.createElement('div');
  div.className = 'leg-card';
  div.id = `leg-${i}`;

  const isFirst = i === 0;
  const originTZ = AIRPORT_TZ[leg.origin] || '';
  const destTZ   = AIRPORT_TZ[leg.dest]   || '';

  div.innerHTML = `
    <div class="leg-header">
      <span class="leg-num">Leg ${i + 1}${isFirst ? ' — Check-in reminder included' : ''}</span>
      ${legs.length > 1 ? `<button class="btn btn-danger btn-sm" onclick="removeLeg(${i})">Remove</button>` : ''}
    </div>
    <div class="grid3">
      <div class="field">
        <label>Airline</label>
        <input type="text" value="${esc(leg.airline)}" oninput="updateLeg(${i},'airline',this.value)">
      </div>
      <div class="field">
        <label>Flight #</label>
        <input type="text" value="${esc(leg.flightnum)}" oninput="updateLeg(${i},'flightnum',this.value)">
      </div>
      <div class="field">
        <label>PNR / Confirmation</label>
        <input type="text" value="${esc(leg.pnr)}" oninput="updateLeg(${i},'pnr',this.value)">
      </div>
    </div>

    <hr class="section-sep">

    <div class="grid2">
      <div class="field">
        <label>Origin (IATA)</label>
        <input type="text" maxlength="3" value="${esc(leg.origin)}" oninput="updateLeg(${i},'origin',this.value.toUpperCase())">
        <div class="tz-hint" id="tz-origin-${i}">${originTZ ? originTZ : '⚠ timezone unknown'}</div>
      </div>
      <div class="field">
        <label>Destination (IATA)</label>
        <input type="text" maxlength="3" value="${esc(leg.dest)}" oninput="updateLeg(${i},'dest',this.value.toUpperCase())">
        <div class="tz-hint" id="tz-dest-${i}">${destTZ ? destTZ : '⚠ timezone unknown'}</div>
      </div>
    </div>

    <div class="grid2" style="margin-top:12px">
      <div class="field">
        <label>Departure (local, 24h)</label>
        <input type="text" placeholder="2026-08-25 18:12" value="${esc(leg.depdt)}" oninput="updateLeg(${i},'depdt',this.value)">
      </div>
      <div class="field">
        <label>Arrival (local, 24h)</label>
        <input type="text" placeholder="2026-08-25 19:42" value="${esc(leg.arrdt)}" oninput="updateLeg(${i},'arrdt',this.value)">
      </div>
    </div>

    <div class="grid3" style="margin-top:12px">
      <div class="field">
        <label>Terminal</label>
        <input type="text" value="${esc(leg.terminal)}" oninput="updateLeg(${i},'terminal',this.value)">
      </div>
      <div class="field">
        <label>Gate</label>
        <input type="text" value="${esc(leg.gate)}" oninput="updateLeg(${i},'gate',this.value)">
      </div>
      <div class="field">
        <label>Seat(s)</label>
        <input type="text" value="${esc(leg.seats)}" oninput="updateLeg(${i},'seats',this.value)">
      </div>
    </div>

    <hr class="section-sep">
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Codeshare (if operated by a different airline)</div>

    <div class="grid3">
      <div class="field">
        <label>Operating Airline</label>
        <input type="text" value="${esc(leg.op_airline)}" oninput="updateLeg(${i},'op_airline',this.value)">
      </div>
      <div class="field">
        <label>Operating Flight #</label>
        <input type="text" value="${esc(leg.op_flightnum)}" oninput="updateLeg(${i},'op_flightnum',this.value)">
      </div>
      <div class="field">
        <label>Operating PNR</label>
        <input type="text" value="${esc(leg.op_pnr)}" oninput="updateLeg(${i},'op_pnr',this.value)">
      </div>
    </div>

    <div class="grid2" style="margin-top:12px">
      <div class="field">
        <label>Class / Fare</label>
        <input type="text" value="${esc(leg.class)}" oninput="updateLeg(${i},'class',this.value)">
      </div>
      <div class="field">
        <label>Aircraft</label>
        <input type="text" value="${esc(leg.equipment)}" oninput="updateLeg(${i},'equipment',this.value)">
      </div>
    </div>
  `;
  return div;
}

function updateLeg(i, field, value) {
  legs[i][field] = value;
  // Update TZ hints live when IATA codes change
  if (field === 'origin') {
    const tz = AIRPORT_TZ[value] || '';
    document.getElementById(`tz-origin-${i}`).textContent = tz || '⚠ timezone unknown';
  }
  if (field === 'dest') {
    const tz = AIRPORT_TZ[value] || '';
    document.getElementById(`tz-dest-${i}`).textContent = tz || '⚠ timezone unknown';
  }
}

function removeLeg(i) {
  legs.splice(i, 1);
  renderLegCards();
  refreshPreviews();
}

function addLeg() {
  legs.push(normalizeLeg({}));
  renderLegCards();
  refreshPreviews();
  // Scroll new card into view
  const card = document.getElementById(`leg-${legs.length - 1}`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─────────────────────────────────────────────────────────────────────────────
// ICS generation
// ─────────────────────────────────────────────────────────────────────────────
function formatICSDateTime(dtStr) {
  if (!dtStr) return '';
  const [date, time] = dtStr.split(' ');
  if (!date || !time) return '';
  return date.replace(/-/g, '') + 'T' + time.replace(':', '') + '00';
}

function foldLine(line) {
  const CRLF = '\r\n';
  if (line.length <= 75) return line;
  let out = '';
  let pos = 0;
  while (pos < line.length) {
    if (pos === 0) { out += line.slice(0, 75); pos = 75; }
    else { out += CRLF + ' ' + line.slice(pos, pos + 74); pos += 74; }
  }
  return out;
}

function escICS(str) {
  return (str || '').replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');
}

function escParam(str) {
  return (str || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
}

function shortAirline(name) {
  return (name || '').replace(/ Air Lines$/i, '').replace(/ Airlines$/i, '');
}

function buildTitle(leg) {
  const hasCodeshare = leg.op_flightnum && leg.op_flightnum !== leg.flightnum;
  if (hasCodeshare) {
    return `${leg.op_flightnum} (${leg.flightnum}) ${leg.dest}`;
  }
  return `${leg.flightnum} ${leg.dest}`.trim();
}

function buildICSLocation(leg) {
  const addr = AIRPORT_ADDR[leg.origin];
  const name = addr ? addr[0] : `${leg.origin} Airport`;
  return leg.terminal ? `${name}, Terminal ${leg.terminal}` : name;
}

function buildLocation(leg) {
  const addr = AIRPORT_ADDR[leg.origin];
  if (!addr) return `${leg.origin} Airport`;
  const parts = [...addr];
  if (leg.terminal) {
    const insertAt = Math.max(1, parts.length - 2);
    parts.splice(insertAt, 0, `Terminal ${leg.terminal}`);
  }
  return parts.join('\n');
}

function buildDescription(leg) {
  const hasOpPnr = leg.op_pnr && leg.op_pnr !== leg.pnr;
  let pnrLine;
  if (hasOpPnr) {
    const opShort  = shortAirline(leg.op_airline);
    const airShort = shortAirline(leg.airline);
    pnrLine = `${opShort} ${leg.op_pnr} / ${airShort} ${leg.pnr}`;
  } else {
    pnrLine = `${shortAirline(leg.airline)} ${leg.pnr}`.trim();
  }
  const depTime = (leg.depdt || '').split(' ')[1] || '';
  const arrTime = (leg.arrdt || '').split(' ')[1] || '';
  let body = pnrLine + '\n\n' + `${depTime} – ${arrTime}`;
  if (leg.seats) body += '\n' + leg.seats;
  if (leg.equipment) body += '\n\n' + leg.equipment;
  return body;
}

function generateUID() {
  return 'fc-' + Date.now() + '-' + Math.random().toString(36).slice(2) + '@flightcal';
}

function generateICS(leg, isFirstLeg, checkinHours) {
  const CRLF = '\r\n';
  const depTZ = AIRPORT_TZ[leg.origin] || null;
  const arrTZ = AIRPORT_TZ[leg.dest]   || null;

  const depICS = formatICSDateTime(leg.depdt);
  const arrICS = formatICSDateTime(leg.arrdt);
  if (!depICS || !arrICS) return null;

  const dtstart = depTZ ? `DTSTART;TZID=${depTZ}:${depICS}` : `DTSTART:${depICS}Z`;
  const dtend   = arrTZ ? `DTEND;TZID=${arrTZ}:${arrICS}`   : `DTEND:${arrICS}Z`;

  // reminder fires 30 min before check-in window opens
  const triggerMinutes = checkinHours * 60 + 30;

  const title    = escICS(buildTitle(leg));
  const locTitle = buildICSLocation(leg);
  const location = escICS(locTitle);
  const desc     = escICS(buildDescription(leg));
  const coords   = AIRPORT_COORDS[leg.origin] || null;
  const now      = new Date().toISOString().replace(/[-:]/g, '').replace(/\.\d+/, '');

  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//FlightCal//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'BEGIN:VEVENT',
    `UID:${generateUID()}`,
    `DTSTAMP:${now}Z`,
    dtstart,
    dtend,
    `SUMMARY:${title}`,
    `LOCATION:${location}`,
    ...(coords ? [`X-APPLE-STRUCTURED-LOCATION;VALUE=URI;X-TITLE="${escParam(locTitle)}":geo:${coords[0]},${coords[1]}`] : []),
    `DESCRIPTION:${desc}`,
  ];

  if (isFirstLeg) {
    lines.push(
      'BEGIN:VALARM',
      'TRIGGER;RELATED=START:-PT' + triggerMinutes + 'M',
      'ACTION:DISPLAY',
      `DESCRIPTION:Check in for ${escICS(leg.flightnum)}`,
      'END:VALARM',
    );
  }

  lines.push('END:VEVENT', 'END:VCALENDAR');

  return lines.map(foldLine).join(CRLF) + CRLF;
}

function makeDataURI(icsContent) {
  const utf8 = unescape(encodeURIComponent(icsContent));
  const b64  = btoa(utf8);
  return `data:text/calendar;charset=utf-8;base64,${b64}`;
}

function icsFilename(leg) {
  const fn   = (leg.flightnum || 'flight').toLowerCase().replace(/\s+/g, '-');
  const dest = (leg.dest || 'xxx').toLowerCase();
  return `${fn}-${dest}.ics`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Preview rendering
// ─────────────────────────────────────────────────────────────────────────────
function refreshPreviews() {
  const container = document.getElementById('previews');
  container.innerHTML = '';

  if (!legs.length) {
    container.innerHTML = '<p class="empty-state">No flight legs yet.</p>';
    return;
  }

  const checkinHours = parseInt(document.getElementById('checkinSelect').value, 10);

  legs.forEach((leg, i) => {
    const isFirst = i === 0;
    const ics = generateICS(leg, isFirst, checkinHours);

    const card = document.createElement('div');
    card.className = 'preview-card';

    const title = buildTitle(leg);
    const desc  = buildDescription(leg);

    const depTime = (leg.depdt || '').split(' ')[1] || '';
    const arrTime = (leg.arrdt || '').split(' ')[1] || '';
    const depDate = (leg.depdt || '').split(' ')[0] || '';
    const depTZ   = AIRPORT_TZ[leg.origin] || 'unknown timezone';
    const arrTZ   = AIRPORT_TZ[leg.dest]   || 'unknown timezone';

    const locationDisplay = buildLocation(leg).replace(/\n/g, ', ');

    let downloadBtn = '';
    if (ics) {
      const uri = makeDataURI(ics);
      const fn  = icsFilename(leg);
      downloadBtn = `<a class="download-link" href="${uri}" download="${fn}">↓ Download ${fn}</a>`;
    } else {
      downloadBtn = '<span style="color:var(--danger);font-size:13px">⚠ Missing departure or arrival time — cannot generate .ics</span>';
    }

    card.innerHTML = `
      <div class="preview-title">${esc(title)}</div>
      <div class="preview-time">${depDate}  ${depTime} → ${arrTime}</div>
      <div class="preview-body">${esc(desc)}</div>
      <div class="preview-meta">
        ${locationDisplay ? `📍 ${esc(locationDisplay)}<br>` : ''}
        🕐 Departs ${depTZ}  |  Arrives ${arrTZ}<br>
        ${isFirst ? `⏰ Check-in reminder: ${checkinHours}h window, alarm ${checkinHours * 60 + 30} min before departure` : ''}
      </div>
      ${downloadBtn}
    `;

    container.appendChild(card);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Utilities
// ─────────────────────────────────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('show');
}

function showWarn(msg) {
  const el = document.getElementById('warnBox');
  el.textContent = msg;
  el.classList.add('show');
}

function clearMessages() {
  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('warnBox').classList.remove('show');
}

function clearAll() {
  document.getElementById('emailInput').value = '';
  legs = [];
  renderLegCards();
  document.getElementById('previews').innerHTML = '';
  document.getElementById('previewSection').style.display = 'none';
  clearMessages();
}

// ─────────────────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────────────────
(function init() {
  const saved = getApiKey();
  if (saved) document.getElementById('apikeyInput').value = saved;
  syncApiKeyStatus();
  updateReminderNote();
})();
</script>
